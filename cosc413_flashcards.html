<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>COSC 413 Flashcards</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    background: #0a0a0f;
    font-family: Georgia, 'Times New Roman', serif;
    color: #e8e4dc;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px 40px;
  }
  .header { text-align: center; margin-bottom: 24px; width: 100%; max-width: 640px; }
  .sub { font-size: 11px; letter-spacing: 4px; color: #6b6860; text-transform: uppercase; margin-bottom: 6px; }
  h1 { font-size: 24px; font-weight: normal; letter-spacing: 1px; color: #e8e4dc; }
  .byline { font-size: 12px; color: #6b6860; margin-top: 4px; }
  .progress-row { display: flex; align-items: center; gap: 10px; margin-top: 14px; }
  .progress-bar { flex: 1; height: 4px; background: #1e1e28; border-radius: 2px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 2px; transition: width 0.4s ease; }
  .progress-label { font-size: 12px; color: #6b6860; white-space: nowrap; }

  .filters { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; margin-bottom: 20px; max-width: 640px; width: 100%; }
  .filter-btn {
    padding: 4px 12px; border-radius: 20px; font-size: 11px; letter-spacing: 1px;
    text-transform: uppercase; cursor: pointer; font-family: inherit;
    border: 1px solid; transition: all 0.2s; background: transparent;
  }

  .counter { font-size: 12px; color: #6b6860; letter-spacing: 2px; margin-bottom: 12px; }

  .card {
    width: 100%; max-width: 620px; min-height: 280px;
    background: #13131c;
    border-radius: 12px;
    padding: 28px 24px;
    cursor: pointer;
    display: flex; flex-direction: column; justify-content: space-between;
    border: 1px solid #ffffff10;
    border-top: 3px solid #8b5cf6;
    box-shadow: 0 8px 40px #8b5cf615;
    transition: background 0.3s, transform 0.2s, opacity 0.2s;
    position: relative; overflow: hidden;
    user-select: none;
  }
  .card.flipped { background: #111118; }
  .card-num {
    position: absolute; top: 14px; right: 18px;
    font-size: 48px; font-weight: bold; line-height: 1;
    color: #ffffff05;
  }
  .card-tag {
    display: inline-block; font-size: 10px; letter-spacing: 3px;
    text-transform: uppercase; margin-bottom: 14px;
    border-bottom: 1px solid; padding-bottom: 4px;
  }
  .card-text {
    font-size: 17px; line-height: 1.75; color: #e8e4dc;
    white-space: pre-line;
  }
  .card-text.answer { font-size: 14px; color: #c5c0b5; }
  .card-hint {
    margin-top: 20px; font-size: 11px; color: #3a3a46;
    letter-spacing: 2px; text-align: center; text-transform: uppercase;
  }

  .controls { display: flex; gap: 10px; margin-top: 18px; width: 100%; max-width: 620px; }
  .btn {
    flex: 1; padding: 13px; background: transparent;
    border: 1px solid #2a2a36; border-radius: 8px; color: #6b6860;
    cursor: pointer; font-family: inherit; font-size: 13px;
    letter-spacing: 1px; transition: all 0.2s;
  }
  .btn:active { opacity: 0.7; }
  .btn-got {
    flex: 2; border-radius: 8px; padding: 13px;
    cursor: pointer; font-family: inherit; font-size: 13px;
    letter-spacing: 1px; transition: all 0.2s;
    border: 1px solid;
  }
  .btn-reset {
    margin-top: 14px; background: transparent; border: none;
    color: #3a3a46; font-size: 11px; cursor: pointer;
    letter-spacing: 2px; text-transform: uppercase; font-family: inherit;
  }
  .footer { margin-top: 22px; font-size: 11px; color: #3a3a46; letter-spacing: 1px; }
</style>
</head>
<body>

<div class="header">
  <div class="sub">COSC 413 · Gombe State University</div>
  <h1>Simulation Methodology</h1>
  <div class="byline">Module 1 · Dr. Lamido Yahaya</div>
  <div class="progress-row">
    <div class="progress-bar"><div class="progress-fill" id="pfill" style="width:0%"></div></div>
    <div class="progress-label" id="plabel">0/42 known</div>
  </div>
</div>

<div class="filters" id="filters"></div>
<div class="counter" id="counter">1 / 42</div>

<div class="card" id="card" onclick="flipCard()">
  <div>
    <div class="card-num" id="cardnum">01</div>
    <div class="card-tag" id="cardtag">Definition</div>
    <div class="card-text" id="cardtext"></div>
  </div>
  <div class="card-hint" id="cardhint">tap to reveal answer</div>
</div>

<div class="controls">
  <button class="btn" onclick="go(-1)">← Prev</button>
  <button class="btn-got" id="gotbtn" onclick="markKnown()">✓ Got it</button>
  <button class="btn" onclick="go(1)">Next →</button>
</div>
<button class="btn-reset" id="resetbtn" onclick="resetProgress()" style="display:none">reset progress</button>
<div class="footer" id="footer">42 cards total · 2025/2026 Session</div>

<script>
const topicColors = {
  "Definition":"#f97316","Types":"#8b5cf6","Comparison":"#06b6d4",
  "Appropriateness":"#10b981","Advantages":"#3b82f6","Disadvantages":"#ef4444",
  "Application":"#f59e0b","Key Concepts":"#ec4899","System Types":"#6366f1",
  "Models":"#14b8a6","V&V":"#84cc16"
};

const cards = [
  {id:1,topic:"Definition",q:"What is a Simulation?",a:"The imitation of the operation of a real-world system over time. It involves designing a model of a real system and conducting experiments with it to understand system behaviour."},
  {id:2,topic:"Definition",q:"Why is simulation important?",a:"Real systems may be:\n• Too complex (e.g. air traffic)\n• Dangerous (e.g. nuclear systems)\n• Expensive (e.g. manufacturing plants)\n...to experiment with directly."},
  {id:3,topic:"Types",q:"What is Deterministic Simulation?",a:"A simulation with NO randomness. Output is completely determined by inputs and initial conditions. Running it multiple times with the same inputs always gives exactly the same results."},
  {id:4,topic:"Types",q:"Give 3 examples of Deterministic Simulation.",a:"1. Production line: each product takes exactly 10 mins\n2. Simple interest: A = P(1+rt)\n3. Traffic light: Green 30s, Red 60s — no variation."},
  {id:5,topic:"Types",q:"What are the advantages of Deterministic Simulation?",a:"• Simple to design and understand\n• Easy to analyze mathematically\n• Fast computation\n• No need for statistical testing"},
  {id:6,topic:"Types",q:"What is Stochastic Simulation?",a:"A simulation where one or more inputs are random variables, causing output to vary each run. It includes uncertainty and randomness, uses probability distributions, and results differ each run."},
  {id:7,topic:"Types",q:"Give 3 examples of Stochastic Simulation.",a:"1. Bank Queue: customers arrive randomly, service time varies\n2. Hospital ER: patients arrive unpredictably\n3. Network Traffic: data packets arrive at random intervals."},
  {id:8,topic:"Types",q:"List 5 advantages of Stochastic Simulation.",a:"• Handles complex systems\n• Supports 'what-if' analysis\n• Provides statistical insights\n• Allows risk analysis\n• Realistic representation of systems"},
  {id:9,topic:"Comparison",q:"What are the 3 technique types and their limitations?",a:"Analytical: math formulas — too complex for some systems.\n\nExperimental: real-world testing — costly and risky.\n\nSimulation: computer-based — requires validation."},
  {id:10,topic:"Appropriateness",q:"When IS simulation appropriate? (6 reasons)",a:"1. Study experiments with internal interactions\n2. Test organizational/environmental changes\n3. Identify most important variables\n4. Pedagogical tool for learning\n5. Verify analytical results (e.g. queuing)\n6. Animate and visualize the system"},
  {id:11,topic:"Appropriateness",q:"When is simulation NOT appropriate? (6 reasons)",a:"1. Problem solvable by common sense\n2. Can be solved mathematically\n3. Direct experiments are easier\n4. Costs exceed savings\n5. No input data available\n6. System behaviour is too complex/unknown (e.g. human behaviour)"},
  {id:12,topic:"Advantages",q:"List 5 general advantages of simulation.",a:"1. Test policies without disrupting real system\n2. Test designs without committing resources\n3. Compress or expand time\n4. Answer 'what-if' questions\n5. Bottleneck analysis to detect excessive delays"},
  {id:13,topic:"Disadvantages",q:"What are the general disadvantages of simulation?",a:"• Model building requires training (like an art)\n• Results can be difficult to interpret\n• Outputs are essentially random variables\n• Time-consuming and expensive\n• Insufficient time/resources → useless results"},
  {id:14,topic:"Application",q:"Name 8 application areas of simulation.",a:"1. Manufacturing plants\n2. Construction & project management\n3. Military operations\n4. Transportation\n5. Business processes\n6. Health care\n7. Computers & Networks\n8. Games & Entertainment"},
  {id:15,topic:"Key Concepts",q:"What is a System?",a:"A collection of components that interact with one another to achieve a goal.\n\nMost important aspects:\n• Components (what it contains)\n• Interactions (how they relate)"},
  {id:16,topic:"Key Concepts",q:"What is an Entity?",a:"An object of interest that moves through the system.\n\nCan be dynamic (e.g. customers) or static (e.g. servers).\n\nExamples: customer in a bank, patient in a hospital, job in a CPU."},
  {id:17,topic:"Key Concepts",q:"What is an Attribute?",a:"A property of an entity.\n\nExamples: customer priority, arrival time, service type.\n\nAttributes influence behaviour and decision-making in a system."},
  {id:18,topic:"Key Concepts",q:"What is an Activity?",a:"A time period of specified length during which something happens.\n\nExamples: service time of a customer, processing time in a system."},
  {id:19,topic:"Key Concepts",q:"What is System State?",a:"A collection of variables required to describe the system at any point in time.\n\nExamples: number of customers in a queue, status of a server (busy/idle), temperature."},
  {id:20,topic:"Key Concepts",q:"What are State Variables?",a:"Variables that define the system's state.\n\nExamples: queue length, number of busy servers, inventory level.\n\nSimulation tracks how they change over time."},
  {id:21,topic:"Key Concepts",q:"What is an Event?",a:"An instantaneous occurrence that might change the system state. Events happen at specific points in time, not continuously.\n\nExample: customer arrives → queue increases; customer leaves → queue decreases."},
  {id:22,topic:"System Types",q:"What is a Discrete System?",a:"A system where state variables change only at discrete points in time.\n\nExamples: Bank, Grocery store, Router, Jobs in a queue."},
  {id:23,topic:"System Types",q:"What is a Continuous System?",a:"A system where state variables change continuously over time.\n\nExamples: Head of water behind a dam, Temperature."},
  {id:24,topic:"Key Concepts",q:"What is a Resource?",a:"A component that provides service to entities.\n\nExamples: bank teller, doctor, machine."},
  {id:25,topic:"Key Concepts",q:"What is a Queue?",a:"A waiting line formed when resources are busy. Works in FIFO (First In, First Out) or LILO order.\n\nExample: customers waiting in line at a bank."},
  {id:26,topic:"Key Concepts",q:"What are Endogenous Activities?",a:"Activities and events occurring WITHIN the system, controlled by its internal state.\n\nExamples: service completion in a queue, inventory reordering, machine breakdown."},
  {id:27,topic:"Key Concepts",q:"What are Exogenous Activities?",a:"Activities from OUTSIDE the system that affect it.\n\nExamples: customer arrivals, external demand, weather changes."},
  {id:28,topic:"Key Concepts",q:"How do endogenous/exogenous activities interact?",a:"Event occurs (e.g. customer arrives — exogenous)\n→ triggers activity (service begins)\n→ activity ends internally (endogenous)\n→ that ending becomes a new event.\n\nSo activity generates future events."},
  {id:29,topic:"Key Concepts",q:"What is a Simulation Clock?",a:"A clock that tracks the progression of time in simulation.\n\nCan be:\n• Fixed increment (step-by-step)\n• Event-driven (jumps to next event)"},
  {id:30,topic:"Key Concepts",q:"What is an Event List (Future Event List)?",a:"A list of all scheduled future events. Simulation always processes the next event in time order.\n\nExample: arrival at 2:00, departure at 3:30."},
  {id:31,topic:"Key Concepts",q:"What is Initialization?",a:"The process of setting the initial conditions of the system before simulation runs.\n\nExample: queue = 0, server = idle."},
  {id:32,topic:"Key Concepts",q:"What is a Termination Condition?",a:"Defines when a simulation stops.\n\nExamples:\n• After 100 customers\n• After 8 hours\n• When the system stabilizes"},
  {id:33,topic:"Key Concepts",q:"What are Performance Measures?",a:"Metrics used to evaluate system efficiency.\n\nExamples: average waiting time, queue length, resource utilization."},
  {id:34,topic:"Models",q:"What is a Model?",a:"A simplified representation of a real system.\n\nRepresents real-world phenomena using variables and logical/quantitative relationships between them.\n\nModelling helps understand interaction of parts of a system."},
  {id:35,topic:"Models",q:"What is a Physical (Iconic) Model?",a:"A tangible miniature representation of a real system.\n\nExamples: car models, railway models, airplane models, building prototypes.\n\nRarely used in simulation studies."},
  {id:36,topic:"Models",q:"What is a Mathematical Model?",a:"An abstract model using mathematical expressions and equations for predictive purposes.\n\nExample: x² + y² = 1 (circle of radius 1)\n\nRequires great skill and knowledge to develop."},
  {id:37,topic:"Models",q:"What is an Analogue Model?",a:"Uses other entities to represent real-world entities.\n\nExamples:\n• Analogue computer — electrical current represents quantities\n• Tyre pressure gauge — dial movement represents air pressure\n• ECG — electrical marks represent muscle/organ activity"},
  {id:38,topic:"Models",q:"What is a Heuristic Model?",a:"Uses intuitive/futuristic rules hoping to produce workable solutions that can be improved.\n\nExample: Arthur C. Clarke's model — forerunner of communications satellites and international TV broadcast."},
  {id:39,topic:"Models",q:"What is a Deterministic Model?",a:"A model that contains certain known and fixed constants throughout its formulation.\n\nExample: Economic Order Quantity (EOQ) for inventory control under uncertainty."},
  {id:40,topic:"Models",q:"What is a Stochastic Model?",a:"A model that involves one or more uncertain variables, subject to probabilities."},
  {id:41,topic:"Models",q:"What is a Simulation Model?",a:"Entities are represented by sequences of random numbers subject to model assumptions.\n\nUsed where:\n• No suitable mathematical model exists\n• The math model is too complex\n• Experimenting on the real system would cause serious disruption"},
  {id:42,topic:"V&V",q:"What is Verification vs Validation?",a:"Verification: Did we build the model CORRECTLY?\n(Checking the process)\n\nValidation: Did we build the CORRECT model?\n(Checking the result matches reality)"},
];

const topics = ["All",...Object.keys(topicColors)];
let currentFilter = "All";
let filtered = [...cards];
let index = 0;
let flipped = false;
let known = new Set();

function getFiltered() {
  return currentFilter === "All" ? cards : cards.filter(c => c.topic === currentFilter);
}

function getColor() {
  return topicColors[filtered[index]?.topic] || "#8b5cf6";
}

function render() {
  const card = filtered[index];
  if (!card) return;
  const color = getColor();

  // card element
  const el = document.getElementById('card');
  el.style.borderTopColor = color;
  el.style.boxShadow = `0 8px 40px ${color}18`;
  el.classList.toggle('flipped', flipped);

  document.getElementById('cardnum').textContent = String(card.id).padStart(2,'0');

  const tag = document.getElementById('cardtag');
  tag.textContent = flipped ? 'Answer' : card.topic;
  tag.style.color = color;
  tag.style.borderBottomColor = color + '70';

  const txt = document.getElementById('cardtext');
  txt.textContent = flipped ? card.a : card.q;
  txt.className = 'card-text' + (flipped ? ' answer' : '');

  document.getElementById('cardhint').textContent = flipped ? 'tap to see question' : 'tap to reveal answer';

  // counter
  document.getElementById('counter').textContent = `${index+1} / ${filtered.length}`;

  // got it button
  const gotBtn = document.getElementById('gotbtn');
  gotBtn.style.background = color + '20';
  gotBtn.style.borderColor = color + '80';
  gotBtn.style.color = color;

  // progress
  const pct = Math.round((known.size / cards.length) * 100);
  document.getElementById('pfill').style.width = pct + '%';
  document.getElementById('pfill').style.background = color;
  document.getElementById('plabel').textContent = `${known.size}/42 known`;

  // reset button
  document.getElementById('resetbtn').style.display = known.size > 0 ? 'block' : 'none';
}

function renderFilters() {
  const container = document.getElementById('filters');
  container.innerHTML = '';
  topics.forEach(t => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn';
    btn.textContent = t;
    const c = t === 'All' ? '#e8e4dc' : topicColors[t];
    btn.style.borderColor = t === 'All' ? '#3a3a46' : c;
    if (t === currentFilter) {
      btn.style.background = c;
      btn.style.color = '#0a0a0f';
    } else {
      btn.style.color = c;
      btn.style.opacity = '0.6';
    }
    btn.onclick = () => {
      currentFilter = t;
      filtered = getFiltered();
      index = 0;
      flipped = false;
      renderFilters();
      render();
    };
    container.appendChild(btn);
  });
}

function flipCard() {
  flipped = !flipped;
  render();
}

function go(dir) {
  flipped = false;
  const el = document.getElementById('card');
  el.style.opacity = '0';
  el.style.transform = `translateX(${dir > 0 ? '-30px' : '30px'})`;
  setTimeout(() => {
    index = (index + dir + filtered.length) % filtered.length;
    render();
    el.style.opacity = '1';
    el.style.transform = 'translateX(0)';
  }, 180);
}

function markKnown() {
  known.add(filtered[index].id);
  go(1);
}

function resetProgress() {
  known = new Set();
  render();
}

// init
filtered = getFiltered();
renderFilters();
render();
</script>
</body>
</html>
